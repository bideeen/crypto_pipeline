name: Pipline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
        
      - name: Install dependencies
        run: 
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run ingestion
        run: python ingestion/fetch_coins.py

      - name: load raw data
        run: python ingestion/load_raw.py

      - name: Run dbt transformations
        run: dbt run
        working-directory: dbt_project

      - name: Run dbt tests
        run: dbt test
        working-directory: dbt_project
